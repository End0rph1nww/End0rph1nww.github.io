<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello, I'm End0rph1nww</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .tagline { font-size: 15px; color: #a0a0c0; margin-bottom: 32px; }

        .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 32px; }

        .links a {
            text-decoration: none;
            color: #c0c0ff;
            background: rgba(102,126,234,0.15);
            border: 1px solid rgba(102,126,234,0.3);
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 14px;
            transition: all 0.25s;
        }

        .links a:hover {
            background: rgba(102,126,234,0.3);
            color: #fff;
            transform: translateY(-2px);
        }

        .footer {
            font-size: 12px;
            color: #606080;
        }

        .footer a { color: #8080b0; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">👋</div>
        <h1>End0rph1nww</h1>
        <p class="tagline">CS Researcher · Graphics · Agent · PCG</p>

        <div class="links">
            <a href="https://github.com/End0rph1nww" target="_blank">GitHub</a>
            <a href="mailto:xiaofanw2002@gmail.com">Email</a>
        </div>

        <p class="footer">
            Built with ❤️ · Hosted on <a href="https://pages.github.com" target="_blank">GitHub Pages</a>
        </p>
    </div>
</body>
</html>
